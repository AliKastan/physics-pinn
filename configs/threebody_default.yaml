# Default configuration for three-body problem PINN

# Physics parameters
physics:
  G: 1.0
  preset: figure_eight  # one of: figure_eight, lagrange_triangle, pythagorean, sun_earth_moon

# Training hyperparameters
training:
  epochs: 10000
  lr: 1.0e-3
  n_collocation: 1000
  ic_weight: 100.0
  conservation_weight: 1.0
  t_max: 1.0
  scheduler: plateau
  patience: 500
  factor: 0.5
  min_lr: 1.0e-6

# Network architecture
network:
  hidden_size: 256
  num_hidden_layers: 5
